<title>PostgreSQL Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
<script>
window.FLASHCARD_CONFIG = {
  title: 'Post<span>gres</span>SQL Flashcards',
  storagePrefix: 'pg-flashcards',
  accentColor: '#336791',
  darkAccentColor: '#5b9bd5',
  categories: {
    "Indexes":     { color: "#336791", darkColor: "#5b9bd5" },
    "Queries":     { color: "#2a8a5a", darkColor: "#4aae6e" },
    "Internals":   { color: "#9b4dca", darkColor: "#c97fd4" },
    "Performance": { color: "#c8650a", darkColor: "#e8a84a" },
    "Data Types":  { color: "#cc342d", darkColor: "#e85d4a" },
  },
  cards: [
    // ── Indexes ──
    {term:"B-tree index",cat:"Indexes",desc:"The default index type. Supports equality and range queries (<, <=, =, >=, >) and ORDER BY. Stores sorted key values in a balanced tree structure.",code:`CREATE INDEX idx_users_email\n  ON users (email);`},
    {term:"Hash index",cat:"Indexes",desc:"Optimized for simple equality (=) lookups only. Smaller than B-tree for equality-only workloads. WAL-logged since Postgres 10.",code:`CREATE INDEX idx_sessions_token\n  ON sessions USING hash (token);`},
    {term:"GIN index",cat:"Indexes",desc:"Generalized Inverted Index — maps each element/key to the rows containing it. Ideal for full-text search, JSONB, arrays, and any multi-valued column.",code:`CREATE INDEX idx_posts_tags\n  ON posts USING gin (tags);\n-- also: tsvector, jsonb_path_ops`},
    {term:"GiST index",cat:"Indexes",desc:"Generalized Search Tree — supports geometric, range, and nearest-neighbor queries. Allows overlapping keys, unlike B-tree.",code:`CREATE INDEX idx_events_during\n  ON events USING gist (during);\n-- range type: tstzrange`},
    {term:"BRIN index",cat:"Indexes",desc:"Block Range Index — stores min/max summaries per block range. Very small, ideal for naturally ordered data (timestamps, serial IDs).",code:`CREATE INDEX idx_logs_created\n  ON logs USING brin (created_at)\n  WITH (pages_per_range = 32);`},
    {term:"SP-GiST index",cat:"Indexes",desc:"Space-Partitioned GiST — for data with natural clustering (IP addresses, phone numbers, geometric points). Uses non-balanced partitioned trees.",code:`CREATE INDEX idx_geo_point\n  ON places USING spgist (location);`},
    {term:"partial index",cat:"Indexes",desc:"An index with a WHERE clause — only indexes rows matching the predicate. Smaller and faster when queries always filter on the same condition.",code:`CREATE INDEX idx_orders_pending\n  ON orders (created_at)\n  WHERE status = 'pending';`},
    {term:"expression index",cat:"Indexes",desc:"Indexes the result of an expression or function rather than a plain column. The query must use the same expression to trigger an index scan.",code:`CREATE INDEX idx_users_lower_email\n  ON users (lower(email));`},
    {term:"covering index (INCLUDE)",cat:"Indexes",desc:"Stores extra columns in the index leaf pages so the query can be answered from the index alone (index-only scan), without visiting the heap.",code:`CREATE INDEX idx_orders_cover\n  ON orders (user_id)\n  INCLUDE (total, status);`},
    {term:"multicolumn index",cat:"Indexes",desc:"A single B-tree index on multiple columns. Useful when queries filter or sort on a known column combination. Leftmost prefix rule applies.",code:`CREATE INDEX idx_events_multi\n  ON events (org_id, created_at DESC);`},
    {term:"unique index",cat:"Indexes",desc:"Enforces uniqueness on the indexed columns. Created implicitly by UNIQUE and PRIMARY KEY constraints. Can be partial for conditional uniqueness.",code:`CREATE UNIQUE INDEX idx_email_uniq\n  ON users (email)\n  WHERE deleted_at IS NULL;`},
    {term:"CONCURRENTLY",cat:"Indexes",desc:"Builds an index without holding a lock that blocks writes. Takes longer and uses more resources, but avoids downtime on live tables.",code:`CREATE INDEX CONCURRENTLY idx_name\n  ON large_table (column);`},

    // ── Queries ──
    {term:"CTEs (WITH queries)",cat:"Queries",desc:"Common Table Expressions define named temporary result sets for a query. Recursive CTEs can traverse trees and graphs.",code:`WITH RECURSIVE tree AS (\n  SELECT id, parent_id, name\n  FROM categories WHERE parent_id IS NULL\n  UNION ALL\n  SELECT c.id, c.parent_id, c.name\n  FROM categories c\n  JOIN tree t ON c.parent_id = t.id\n)\nSELECT * FROM tree;`},
    {term:"window functions",cat:"Queries",desc:"Compute a value across a set of rows related to the current row without collapsing them. Defined with OVER(PARTITION BY ... ORDER BY ...).",code:`SELECT name, department,\n  salary,\n  RANK() OVER (\n    PARTITION BY department\n    ORDER BY salary DESC\n  ) AS dept_rank\nFROM employees;`},
    {term:"LATERAL join",cat:"Queries",desc:"Allows a subquery in FROM to reference columns from preceding tables — like a correlated subquery that returns multiple columns/rows.",code:`SELECT u.name, recent.*\nFROM users u,\nLATERAL (\n  SELECT * FROM orders\n  WHERE user_id = u.id\n  ORDER BY created_at DESC\n  LIMIT 3\n) recent;`},
    {term:"DISTINCT ON",cat:"Queries",desc:"PostgreSQL extension that returns the first row for each distinct value of the specified expressions, controlled by ORDER BY.",code:`SELECT DISTINCT ON (user_id)\n  user_id, created_at, amount\nFROM orders\nORDER BY user_id, created_at DESC;`},
    {term:"FILTER clause",cat:"Queries",desc:"Applies a WHERE condition to a single aggregate function without affecting others in the same query.",code:`SELECT\n  COUNT(*) AS total,\n  COUNT(*) FILTER (\n    WHERE status = 'active'\n  ) AS active\nFROM users;`},
    {term:"UPSERT (ON CONFLICT)",cat:"Queries",desc:"INSERT with a conflict resolution strategy — either update the existing row or do nothing. Requires a unique constraint or index.",code:`INSERT INTO kv (key, value)\nVALUES ('hits', 1)\nON CONFLICT (key)\nDO UPDATE SET value = kv.value + 1;`},
    {term:"RETURNING clause",cat:"Queries",desc:"Returns data from rows affected by INSERT, UPDATE, or DELETE — avoids a second query to fetch the result.",code:`UPDATE accounts\nSET balance = balance - 100\nWHERE id = 42\nRETURNING id, balance;`},
    {term:"generate_series",cat:"Queries",desc:"Set-returning function that produces a sequence of values — integers, timestamps, etc. Great for filling gaps in time-series data.",code:`SELECT d::date, COALESCE(cnt, 0)\nFROM generate_series(\n  '2024-01-01', '2024-01-31',\n  '1 day'::interval\n) d\nLEFT JOIN daily_counts\n  ON day = d::date;`},
    {term:"array_agg / string_agg",cat:"Queries",desc:"Aggregate functions that collect values into an array or a delimited string. Use ORDER BY inside for deterministic ordering.",code:`SELECT author_id,\n  array_agg(\n    title ORDER BY published_at\n  ) AS titles\nFROM books\nGROUP BY author_id;`},
    {term:"EXISTS vs IN",cat:"Queries",desc:"EXISTS short-circuits on the first match and handles NULLs correctly. IN materializes the full subquery. Prefer EXISTS for correlated checks.",code:`-- prefer this:\nSELECT * FROM users u\nWHERE EXISTS (\n  SELECT 1 FROM orders o\n  WHERE o.user_id = u.id\n);`},
    {term:"GROUPING SETS / CUBE / ROLLUP",cat:"Queries",desc:"Compute multiple levels of aggregation in a single query. ROLLUP gives hierarchical subtotals; CUBE gives all combinations.",code:`SELECT region, product,\n  SUM(revenue)\nFROM sales\nGROUP BY ROLLUP (region, product);`},

    // ── Internals ──
    {term:"MVCC",cat:"Internals",desc:"Multi-Version Concurrency Control — each transaction sees a snapshot of data. Writers never block readers. Old row versions are cleaned up by VACUUM.",code:`-- every row has hidden columns:\n-- xmin: txid that inserted it\n-- xmax: txid that deleted/updated it`},
    {term:"WAL (Write-Ahead Log)",cat:"Internals",desc:"All changes are written to a sequential log before being applied to data files. Guarantees durability and enables replication and point-in-time recovery.",code:`-- key settings:\nwal_level = replica\nmax_wal_senders = 10\narchive_mode = on`},
    {term:"VACUUM",cat:"Internals",desc:"Reclaims storage from dead tuples left by MVCC. VACUUM frees space for reuse; VACUUM FULL rewrites the table to reclaim disk space.",code:`VACUUM (VERBOSE) my_table;\nVACUUM FULL my_table;\n-- autovacuum runs automatically`},
    {term:"TOAST",cat:"Internals",desc:"The Oversized Attribute Storage Technique — automatically compresses and/or moves large field values (>2KB) to a separate TOAST table.",code:`-- strategies per column:\n-- PLAIN:    no toast (fixed-length)\n-- EXTENDED: compress + out-of-line\n-- EXTERNAL: out-of-line, no compress\n-- MAIN:     compress, avoid out-of-line`},
    {term:"transaction isolation levels",cat:"Internals",desc:"Read Committed (default): sees each statement's own snapshot. Repeatable Read: snapshot at first statement. Serializable: full serializability via SSI.",code:`BEGIN ISOLATION LEVEL\n  SERIALIZABLE;\n-- levels: READ COMMITTED,\n--   REPEATABLE READ, SERIALIZABLE`},
    {term:"advisory locks",cat:"Internals",desc:"Application-defined locks that Postgres manages but doesn't enforce on data. Useful for coordinating processes outside normal row/table locking.",code:`-- session-level:\nSELECT pg_advisory_lock(42);\nSELECT pg_advisory_unlock(42);\n-- transaction-level:\nSELECT pg_advisory_xact_lock(42);`},
    {term:"pg_stat_statements",cat:"Internals",desc:"Extension that tracks execution statistics for all normalized SQL statements — the most important tool for finding slow queries.",code:`SELECT query,\n  calls, mean_exec_time,\n  total_exec_time\nFROM pg_stat_statements\nORDER BY total_exec_time DESC\nLIMIT 10;`},
    {term:"logical replication",cat:"Internals",desc:"Replicates data changes at the logical (row) level using publications and subscriptions. Allows selective table replication and cross-version upgrades.",code:`-- on publisher:\nCREATE PUBLICATION my_pub\n  FOR TABLE users, orders;\n-- on subscriber:\nCREATE SUBSCRIPTION my_sub\n  CONNECTION 'host=...'\n  PUBLICATION my_pub;`},
    {term:"tablespaces",cat:"Internals",desc:"Allow you to define locations on disk where database objects are stored. Useful for placing frequently accessed tables on fast SSDs.",code:`CREATE TABLESPACE fast_ssd\n  LOCATION '/mnt/ssd/pg_data';\nCREATE TABLE hot_data (...)\n  TABLESPACE fast_ssd;`},
    {term:"system catalogs",cat:"Internals",desc:"Internal tables (pg_class, pg_attribute, pg_index, etc.) that store metadata about all database objects. The information_schema is a SQL-standard view over them.",code:`SELECT relname, reltuples, relpages\nFROM pg_class\nWHERE relkind = 'r'\nORDER BY reltuples DESC;`},
    {term:"row-level security (RLS)",cat:"Internals",desc:"Policies that filter which rows a user can see or modify, enforced transparently. Must be enabled per table with ALTER TABLE ... ENABLE ROW LEVEL SECURITY.",code:`ALTER TABLE documents\n  ENABLE ROW LEVEL SECURITY;\nCREATE POLICY tenant_iso\n  ON documents\n  USING (tenant_id = current_setting(\n    'app.tenant_id')::int);`},

    // ── Performance ──
    {term:"EXPLAIN ANALYZE",cat:"Performance",desc:"Runs the query and shows the actual execution plan with real timings and row counts. Add BUFFERS to see I/O. Never use on destructive queries without a transaction.",code:`EXPLAIN (ANALYZE, BUFFERS, FORMAT TEXT)\nSELECT * FROM orders\nWHERE user_id = 42;`},
    {term:"seq scan vs index scan",cat:"Performance",desc:"Seq scan reads every row — fast for small tables or low selectivity. Index scan uses an index — wins when selecting a small fraction of rows (typically <10-15%).",code:`-- force for testing:\nSET enable_seqscan = off;\n-- check: Seq Scan vs Index Scan\n-- in EXPLAIN output`},
    {term:"bitmap index scan",cat:"Performance",desc:"Scans the index to build a bitmap of matching pages, then reads those pages. Efficient for medium selectivity or combining multiple indexes with AND/OR.",code:`-- appears in EXPLAIN as:\n-- Bitmap Heap Scan\n--   -> BitmapAnd / BitmapOr\n--     -> Bitmap Index Scan`},
    {term:"index-only scan",cat:"Performance",desc:"Answers the query entirely from the index without visiting the table heap. Requires all needed columns in the index and a recently vacuumed visibility map.",code:`-- EXPLAIN shows:\n-- Index Only Scan using idx_name\n--   Heap Fetches: 0  <- ideal`},
    {term:"connection pooling",cat:"Performance",desc:"Each Postgres connection consumes ~10MB RAM and a process. Use a pooler (PgBouncer, pgcat) in transaction mode to multiplex thousands of clients over fewer connections.",code:`-- pgbouncer.ini:\n[databases]\nmydb = host=localhost\n[pgbouncer]\npool_mode = transaction\nmax_client_conn = 1000\ndefault_pool_size = 20`},
    {term:"partitioning",cat:"Performance",desc:"Splits a large table into smaller physical partitions by range, list, or hash. Enables partition pruning and easier data lifecycle management.",code:`CREATE TABLE events (\n  id bigint, created_at timestamptz,\n  data jsonb\n) PARTITION BY RANGE (created_at);\n\nCREATE TABLE events_2024_q1\n  PARTITION OF events\n  FOR VALUES FROM ('2024-01-01')\n  TO ('2024-04-01');`},
    {term:"statistics target",cat:"Performance",desc:"Controls how many values the planner samples when computing column statistics. Increase for columns with skewed distributions to get better query plans.",code:`ALTER TABLE orders\n  ALTER COLUMN status\n  SET STATISTICS 1000;\nANALYZE orders;`},
    {term:"work_mem",cat:"Performance",desc:"Memory allocated per sort/hash operation per query. Too low causes disk spills; too high risks OOM with many concurrent queries. Set per-session for big queries.",code:`-- global default:\nSET work_mem = '16MB';\n-- per query:\nSET LOCAL work_mem = '256MB';`},
    {term:"HOT updates",cat:"Performance",desc:"Heap-Only Tuple updates — when an update doesn't change any indexed column and the new tuple fits on the same page, Postgres avoids updating the index entirely.",code:`-- check HOT ratio:\nSELECT n_tup_hot_upd, n_tup_upd\nFROM pg_stat_user_tables\nWHERE relname = 'my_table';`},
    {term:"pg_stat_user_tables",cat:"Performance",desc:"Shows per-table stats: sequential vs index scans, rows fetched, inserts/updates/deletes, dead tuples, and last vacuum/analyze times.",code:`SELECT relname,\n  seq_scan, idx_scan,\n  n_live_tup, n_dead_tup,\n  last_autovacuum\nFROM pg_stat_user_tables\nORDER BY n_dead_tup DESC;`},

    // ── Data Types ──
    {term:"JSONB",cat:"Data Types",desc:"Binary JSON storage with indexing support. Supports containment (@>), existence (?), and path (->>, #>>) operators. Use GIN index for fast lookups.",code:`SELECT * FROM events\nWHERE payload @> '{"type": "click"}';\n\nCREATE INDEX idx_payload\n  ON events USING gin (payload);`},
    {term:"arrays",cat:"Data Types",desc:"First-class array columns with operators for containment (@>), overlap (&&), and indexing. GIN indexes speed up element lookups.",code:`SELECT * FROM posts\nWHERE tags @> ARRAY['postgres'];\n\nSELECT unnest(tags) AS tag,\n  COUNT(*) FROM posts GROUP BY 1;`},
    {term:"hstore",cat:"Data Types",desc:"Key-value store in a single column. Lighter than JSONB when you only need flat string-to-string pairs. Supports GIN/GiST indexing.",code:`SELECT settings->'timezone'\nFROM users\nWHERE settings ? 'timezone';`},
    {term:"range types",cat:"Data Types",desc:"Represent a range of values (int4range, tstzrange, daterange, etc.) with built-in operators for overlap (&&), containment (@>), and adjacency (-|-).",code:`SELECT * FROM bookings\nWHERE during && tstzrange(\n  '2024-03-01', '2024-03-07'\n);\n-- exclude overlap constraint:\nEXCLUDE USING gist (room WITH =,\n  during WITH &&)`},
    {term:"UUID",cat:"Data Types",desc:"128-bit universally unique identifier. Use gen_random_uuid() (built-in since PG 13) for random UUIDs. Good for distributed IDs but can fragment B-tree indexes.",code:`CREATE TABLE items (\n  id uuid DEFAULT gen_random_uuid()\n    PRIMARY KEY,\n  name text NOT NULL\n);`},
    {term:"enum types",cat:"Data Types",desc:"User-defined types with a fixed, ordered set of values. Stored as 4 bytes internally. Adding values is easy; removing requires recreating the type.",code:`CREATE TYPE status AS ENUM (\n  'draft', 'published', 'archived'\n);\nALTER TYPE status\n  ADD VALUE 'reviewing'\n  BEFORE 'published';`},
    {term:"tsvector / tsquery",cat:"Data Types",desc:"Built-in full-text search types. tsvector stores normalized lexemes with positions; tsquery represents a search expression. Use GIN index for performance.",code:`ALTER TABLE posts ADD COLUMN\n  search tsvector\n  GENERATED ALWAYS AS (\n    to_tsvector('english',\n      title || ' ' || body)\n  ) STORED;\nCREATE INDEX idx_search\n  ON posts USING gin (search);`},
    {term:"CIDR / INET / macaddr",cat:"Data Types",desc:"Network address types with built-in operators for containment (>>), subnet masking, and ordering. Much more efficient than storing IPs as text.",code:`SELECT * FROM access_log\nWHERE client_ip <<\n  '192.168.1.0/24'::cidr;`},
    {term:"interval",cat:"Data Types",desc:"Represents a duration of time. Supports arithmetic with timestamps and other intervals. Can be specified in multiple units.",code:`SELECT now() - '30 days'::interval;\nSELECT age('2024-06-01', '2024-01-01');\n-- result: 5 mons`},
    {term:"domain types",cat:"Data Types",desc:"Named types built on existing types with added constraints. Useful for enforcing validation rules at the type level across multiple tables.",code:`CREATE DOMAIN email AS text\n  CHECK (\n    VALUE ~ '^[^@]+@[^@]+\\.[^@]+$'\n  );\nCREATE TABLE users (\n  contact email NOT NULL\n);`},
  ]
};
</script>
<script src="/flashcards/src/srs.js"></script>
<script src="/flashcards/src/flashcard-engine.js"></script>
</body>
