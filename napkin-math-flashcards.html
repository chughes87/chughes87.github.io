<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Napkin Math Flashcards</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
</head>
<body>
<script>
window.FLASHCARD_CONFIG = {
  title: 'Napkin <span>Math</span> Flashcards',
  storagePrefix: 'napkin-math',
  accentColor: '#e8590c',
  darkAccentColor: '#f08c4a',
  categories: {
    "Latency":    { color: "#e8590c", darkColor: "#f08c4a" },
    "Throughput": { color: "#1971c2", darkColor: "#4a9ae8" },
    "Storage":    { color: "#2f9e44", darkColor: "#4aae6e" },
    "Decisions":  { color: "#9c36b5", darkColor: "#c97fd4" },
    "Conversions":{ color: "#e03131", darkColor: "#e85d4a" },
  },
  cards: [
    // ── Latency ──
    {term:"L1 cache reference",cat:"Latency",desc:"~1 ns\n\nThis is your baseline. Everything else is slower than this."},
    {term:"L2 cache reference",cat:"Latency",desc:"~4 ns\n\n~4x slower than L1."},
    {term:"RAM (main memory) reference",cat:"Latency",desc:"~100 ns\n\n100x slower than L1. Still extremely fast \u2014 in-memory data structures are your friend."},
    {term:"SSD random read",cat:"Latency",desc:"~16 \u03bcs (16,000 ns)\n\n~160x slower than RAM. But still fast enough for most DB reads."},
    {term:"HDD disk seek",cat:"Latency",desc:"~2\u201310 ms\n\n~100,000x slower than RAM. This is why we cache aggressively."},
    {term:"Round trip within same datacenter",cat:"Latency",desc:"~0.5 ms (500 \u03bcs)\n\nEach network hop in your architecture adds ~0.5ms. 10 sequential service calls = 5ms just in network latency."},
    {term:"Round trip: California \u2192 Netherlands \u2192 California",cat:"Latency",desc:"~150 ms\n\nSpeed of light limit. This is why CDNs and regional replicas matter for global users."},
    {term:"Mutex lock/unlock",cat:"Latency",desc:"~17 ns\n\nCheap but adds up in hot paths with contention."},
    {term:"Read 1 MB sequentially from RAM",cat:"Latency",desc:"~3 \u03bcs\n\nRAM is great for sequential access. ~250 \u03bcs from SSD, ~825 \u03bcs from HDD."},
    {term:"Read 1 MB sequentially from SSD",cat:"Latency",desc:"~250 \u03bcs (0.25 ms)\n\n~80x slower than RAM for sequential reads. Still very fast."},
    {term:"Read 1 MB sequentially from HDD",cat:"Latency",desc:"~825 \u03bcs (~1 ms)\n\nOnly ~3x slower than SSD for sequential reads. HDDs are bad at random, decent at sequential."},

    // ── Throughput ──
    {term:"QPS a single web server can handle (e.g., Nginx)",cat:"Throughput",desc:"~10K\u2013100K+ QPS\n\nFor simple requests. CPU-heavy work drops this significantly. A typical app server: 1K\u201310K QPS."},
    {term:"QPS a single MySQL/Postgres instance handles",cat:"Throughput",desc:"~1K\u201310K QPS (reads), ~1K\u20135K QPS (writes)\n\nDepends heavily on query complexity. Simple key lookups are fast; joins and scans kill throughput."},
    {term:"QPS a single Redis instance handles",cat:"Throughput",desc:"~100K+ QPS\n\nIn-memory, single-threaded. Great for caching, rate limiting, sessions. ~100K reads or writes/sec."},
    {term:"QPS a single Cassandra node handles",cat:"Throughput",desc:"~10K\u201350K QPS (writes), ~5K\u201320K QPS (reads)\n\nOptimized for writes. Scales linearly by adding nodes."},
    {term:"What's the bandwidth of a 1 Gbps network link?",cat:"Throughput",desc:"~125 MB/s\n\n1 Gbps \u00f7 8 = 125 MB/s. Typical datacenter links are 1\u201325 Gbps. Cross-region is slower."},
    {term:"How many connections can a single server handle?",cat:"Throughput",desc:"~10K\u20131M+ (C10K problem)\n\nWith epoll/kqueue (event-driven): millions of idle connections. Active connections limited by CPU/memory."},
    {term:"Kafka throughput per broker",cat:"Throughput",desc:"~100K\u2013200K+ messages/sec, ~100 MB/s\n\nKafka is built for throughput. A small cluster handles millions of events/sec."},

    // ── Storage ──
    {term:"How much storage for 1 billion user records (1 KB each)?",cat:"Storage",desc:"~1 TB\n\n1B \u00d7 1 KB = 1 TB. Fits on a single modern disk. Don't over-shard too early."},
    {term:"How many tweets per day does Twitter/X handle?",cat:"Storage",desc:"~500M tweets/day \u2192 ~6K tweets/sec\n\nGood benchmark for a high-write social system. Peak is 2\u20133x average."},
    {term:"Storage for 1 million images (each ~200 KB)?",cat:"Storage",desc:"~200 GB\n\n1M \u00d7 200 KB = 200 GB. Object storage (S3) is the right answer, not your DB."},
    {term:"How much RAM does a modern server have?",cat:"Storage",desc:"64 GB \u2013 512 GB typical, up to 1\u20132 TB\n\nA single server can cache a LOT of data in memory. Don't jump to distributed caching too fast."},
    {term:"How much disk does a modern server have?",cat:"Storage",desc:"1\u201316 TB SSD, up to 100 TB+ HDD\n\nA single machine can store a lot. Think twice before distributing data you don't have to."},
    {term:"How many daily active users (DAU) is 'large scale'?",cat:"Storage",desc:"~10M+ DAU is genuinely large scale\n\nMost startups are <1M DAU. Don't design for Google scale unless the problem actually needs it."},
    {term:"Estimate storage for 5M users sending 40 messages/day (avg 100 bytes each) for 1 year",cat:"Storage",desc:"~7 TB/year\n\n5M \u00d7 40 \u00d7 100B \u00d7 365 \u2248 7.3 TB. Add metadata overhead (~2x) \u2192 ~15 TB. One beefy machine or a small cluster."},

    // ── Decisions ──
    {term:"When do you NEED a cache (Redis/Memcached)?",cat:"Decisions",desc:"When your DB can't handle the read QPS, OR p99 latency is too high\n\nIf your DB handles the load fine at <50ms, you don't need a cache. Don't add one 'just because.' Redis: ~100K QPS. DB: ~5K QPS. Add cache when you need that 20x gap."},
    {term:"When do you need to shard your database?",cat:"Decisions",desc:"When data > single machine disk (multi-TB) OR write QPS > single node capacity (~5K\u201310K)\n\nSharding is complex. Try vertical scaling, read replicas, and caching first. Many systems never need sharding."},
    {term:"SQL vs. NoSQL \u2014 when to pick NoSQL?",cat:"Decisions",desc:"When you need: massive write throughput, flexible schema, horizontal scaling, OR no complex joins\n\nIf you need transactions, complex queries, or strong consistency \u2192 SQL. Most CRUD apps are fine with SQL."},
    {term:"When do you need a message queue (Kafka, SQS)?",cat:"Decisions",desc:"When you need to decouple producers/consumers, handle burst traffic, OR ensure at-least-once delivery\n\nIf your write path is simple and synchronous and latency-sensitive, you might not need one. Queues add complexity."},
    {term:"When does a single server stop being enough?",cat:"Decisions",desc:"At ~10K\u201350K QPS for a typical web app, or when you need high availability (HA)\n\nA single modern server is shockingly powerful. The main reason to distribute is HA, not just throughput."},
    {term:"CDN: when is it worth it?",cat:"Decisions",desc:"When serving static assets to geographically distributed users AND latency matters\n\nCross-continent round trip: ~150ms. CDN brings it to ~10\u201330ms. Essential for images, video, static files."},
    {term:"When do you need a load balancer?",cat:"Decisions",desc:"When you have 2+ servers. So basically always in production.\n\nEven if you have one server, an LB gives you zero-downtime deploys. It's table stakes, not over-engineering."},
    {term:"Read replicas vs. caching \u2014 which first?",cat:"Decisions",desc:"Caching first (it's simpler and gives 10\u2013100x more throughput boost)\n\nA read replica doubles read capacity. A cache gives 10\u2013100x. Cache for hot data, replicas for heavy analytical reads."},
    {term:"When should you consider a search engine (Elasticsearch)?",cat:"Decisions",desc:"Full-text search, complex filtering across many fields, or fuzzy/typo-tolerant search\n\nDon't use ES as your primary database. Use it as a secondary index. SQL LIKE '%query%' doesn't scale."},
    {term:"Monolith vs. microservices?",cat:"Decisions",desc:"Start monolith. Split when: team > ~20 engineers, deploy conflicts frequent, OR components scale very differently\n\nMicroservices are a scaling strategy for TEAMS, not just traffic. Don't split prematurely."},

    // ── Conversions ──
    {term:"Seconds in a day?",cat:"Conversions",desc:"~86,400 \u2192 round to ~100K for napkin math\n\n24 \u00d7 60 \u00d7 60 = 86,400. Using 100K (10\u2075) makes division easy."},
    {term:"Seconds in a month? In a year?",cat:"Conversions",desc:"Month: ~2.5M (2.5 \u00d7 10\u2076). Year: ~30M (3 \u00d7 10\u2077).\n\nHandy for converting 'X per day' to 'X per second.' Just divide daily count by 100K."},
    {term:"Daily Active Users \u2192 QPS rule of thumb?",cat:"Conversions",desc:"DAU \u00d7 avg_requests_per_user \u00f7 86,400. Peak \u2248 2\u20133x average.\n\nExample: 10M DAU, 10 requests each = 100M/day \u00f7 100K \u2248 1K QPS avg, ~3K QPS peak."},
    {term:"Powers of 2 you should know: 2\u00b9\u2070, 2\u00b2\u2070, 2\u00b3\u2070, 2\u2074\u2070",cat:"Conversions",desc:"2\u00b9\u2070 \u2248 1 Thousand, 2\u00b2\u2070 \u2248 1 Million, 2\u00b3\u2070 \u2248 1 Billion, 2\u2074\u2070 \u2248 1 Trillion\n\nKB = 2\u00b9\u2070, MB = 2\u00b2\u2070, GB = 2\u00b3\u2070, TB = 2\u2074\u2070. These are your anchors."},
    {term:"Characters in a typical tweet / chat message?",cat:"Conversions",desc:"~140\u2013280 chars \u2192 ~200 bytes (UTF-8 avg). With metadata: ~1 KB.\n\nFor napkin math, use 1 KB per message/record as a safe default."},
    {term:"Size of a typical UUID?",cat:"Conversions",desc:"16 bytes (128 bits) raw, 36 bytes as string\n\nIDs add up at scale. 1 billion UUIDs (string) \u2248 36 GB just for the IDs."},
    {term:"Typical image sizes?",cat:"Conversions",desc:"Thumbnail: ~10 KB. Web image: ~200 KB. High-res photo: ~2\u20135 MB.\n\nVideo frame: ~50 KB compressed. 1 min of 1080p video: ~10\u201315 MB compressed."},
    {term:"The 80/20 rule for caching",cat:"Conversions",desc:"20% of data serves 80% of requests. Cache the hot 20%.\n\nIf you have 100 GB of data, a 20 GB cache could handle 80% of reads. Size your cache accordingly."},
  ]
};
</script>
<script src="/flashcard-engine.js"></script>
</body>
</html>
