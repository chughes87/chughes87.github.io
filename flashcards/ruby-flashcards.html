<script>
window.FLASHCARD_CONFIG = {
  title: 'Ruby <span>&</span> Rails Flashcards',
  storagePrefix: 'ruby-flashcards',
  accentColor: '#cc342d',
  darkAccentColor: '#e85d4a',
  categoryLabels: { "Background Jobs": "BG Jobs" },
  categories: {
    "Ruby":             { color: "#cc342d", darkColor: "#e85d4a" },
    "Rails":            { color: "#3a8a5a", darkColor: "#4aae6e" },
    "Metaprogramming":  { color: "#9b4dca", darkColor: "#c97fd4" },
    "RSpec":            { color: "#c8850a", darkColor: "#e8a84a" },
    "Background Jobs":  { color: "#2a7ad8", darkColor: "#4a9ae8" },
  },
  cards: [
    {term:"safe navigation (&.)",cat:"Ruby",desc:"Calls a method only if the receiver is not nil, avoiding NoMethodError.",code:`user&.profile&.avatar_url`},
    {term:"symbol to proc (&:method)",cat:"Ruby",desc:"Converts a symbol into a proc for clean iterator shorthand.",code:`names = users.map(&:name)\nnums.select(&:even?)`},
    {term:"multiple return values",cat:"Ruby",desc:"Methods can return multiple values as an implicit array, destructured on assignment.",code:`def min_max(arr) = [arr.min, arr.max]\nlo, hi = min_max([3,1,5])`},
    {term:"string interpolation",cat:"Ruby",desc:"Embed any Ruby expression inside a double-quoted string with \#{...}.",code:`puts "Hello, \#{name.upcase}!"`},
    {term:"conditional assignment (||=)",cat:"Ruby",desc:"Assigns a value only if the variable is nil or false.",code:`options[:timeout] ||= 30`},
    {term:"tap",cat:"Ruby",desc:"Yields self to a block and returns self — great for debug-logging in a chain.",code:`user.tap { |u| logger.info(u) }.save`},
    {term:"splat operator (*)",cat:"Ruby",desc:"Collects remaining args into an array, or expands an array into arguments.",code:`def greet(first, *rest) = puts "Hi \#{first}"\ngreet(*names)`},
    {term:"double splat (**)",cat:"Ruby",desc:"Collects remaining keyword arguments into a hash, or expands a hash into kwargs.",code:`def configure(**opts)\n  opts[:debug] ||= false\nend`},
    {term:"Comparable module",cat:"Ruby",desc:"Include Comparable and define <=> to get <, <=, >=, >, between?, clamp for free.",code:`class Temp\n  include Comparable\n  def <=>(other) = degrees <=> other.degrees\nend`},
    {term:"each_with_object",cat:"Ruby",desc:"Iterates with a memo object, returning it — cleaner than inject for building collections.",code:`[1,2,3].each_with_object([]) { |n,a| a << n*2 }`},
    {term:"proc vs lambda",cat:"Ruby",desc:"Lambdas check arity and return from themselves; procs skip arity and return from the caller.",code:`lam = ->(x) { x * 2 }\npr  = proc { |x| x * 2 }`},
    {term:"frozen_string_literal",cat:"Ruby",desc:"Magic comment that freezes all string literals in the file, improving perf and preventing mutation.",code:`# frozen_string_literal: true`},
    {term:"pattern matching (case/in)",cat:"Ruby",desc:"Ruby 3+ structural matching deconstructs objects in case/in expressions.",code:`case user\nin { role: "admin", name: String => n }\n  puts "Admin: \#{n}"\nend`},
    {term:"endless method",cat:"Ruby",desc:"Ruby 3.0+ one-liner method definition syntax — no end keyword needed.",code:`def double(x) = x * 2\ndef greet(name) = "Hello, \#{name}"`},
    {term:"numbered block params (_1, _2)",cat:"Ruby",desc:"Ruby 2.7+ shorthand for block parameters when names add no clarity.",code:`[1,2,3].map { _1 * 2 }\nhash.map { "\#{_1}: \#{_2}" }`},
    {term:"scope",cat:"Rails",desc:"Named query fragments on a model using lambdas, chainable like any relation.",code:`scope :active, -> { where(active: true) }\nscope :recent, -> { order(created_at: :desc) }\nUser.active.recent.limit(10)`},
    {term:"strong parameters",cat:"Rails",desc:"Require and permit expected params before mass-assignment to prevent over-posting.",code:`params.require(:user).permit(:name, :email)`},
    {term:"before_action",cat:"Rails",desc:"Controller callback that runs before specified actions — ideal for auth and resource loading.",code:`before_action :authenticate_user!\nbefore_action :set_post, only: [:show,:edit]`},
    {term:"concerns (ActiveSupport::Concern)",cat:"Rails",desc:"Reusable modules for models/controllers with hooks and class methods.",code:`module Publishable\n  extend ActiveSupport::Concern\n  included { scope :published, -> { where(published: true) } }\nend`},
    {term:"has_many :through",cat:"Rails",desc:"Many-to-many via a join model, with full access to the join record's attributes.",code:`has_many :enrollments\nhas_many :courses, through: :enrollments`},
    {term:"polymorphic associations",cat:"Rails",desc:"A single association that can belong to more than one model type.",code:`belongs_to :commentable, polymorphic: true\n# Post: has_many :comments, as: :commentable`},
    {term:"counter_cache",cat:"Rails",desc:"Keeps a cached count column on the parent, avoiding COUNT(*) queries.",code:`belongs_to :post, counter_cache: true\n# add :comments_count to posts table`},
    {term:"find_each",cat:"Rails",desc:"Fetches large datasets in batches, avoiding loading all records into memory.",code:`User.find_each(batch_size: 500) { |u| u.send_digest! }`},
    {term:"includes (eager loading)",cat:"Rails",desc:"Prevents N+1 queries by preloading associations.",code:`Post.includes(:author, :comments).where(published: true)`},
    {term:"delegate",cat:"Rails",desc:"Delegates method calls to an association, flattening the API.",code:`delegate :name, :email, to: :user, prefix: true\n# exposes: post.user_name, post.user_email`},
    {term:"service objects",cat:"Rails",desc:"Plain Ruby objects in app/services encapsulating a single business operation.",code:`class CreateOrder\n  def initialize(user, cart)\n    @user, @cart = user, cart\n  end\n  def call\n    # create, charge, notify\n  end\nend`},
    {term:"turbo_stream (Hotwire)",cat:"Rails",desc:"Replaces a page fragment over WebSocket or form response without a full reload.",code:`turbo_stream.replace "msg_\#{@msg.id}",\n  partial: "messages/message",\n  locals: { message: @msg }`},
    {term:"method_missing",cat:"Metaprogramming",desc:"Override to intercept undefined method calls — the basis of many DSLs.",code:`def method_missing(name, *args)\n  return find_by(name) if name.to_s.start_with?("find_by_")\n  super\nend`},
    {term:"respond_to_missing?",cat:"Metaprogramming",desc:"Always pair with method_missing so introspection works correctly.",code:`def respond_to_missing?(name, include_private = false)\n  name.to_s.start_with?("find_by_") || super\nend`},
    {term:"define_method",cat:"Metaprogramming",desc:"Defines a method dynamically inside a class at runtime — cleaner than eval.",code:`%w[admin editor viewer].each do |role|\n  define_method("\#{role}?") { self.role == role }\nend`},
    {term:"class_eval / module_eval",cat:"Metaprogramming",desc:"Reopens a class in the context of a string or block to add methods dynamically.",code:`String.class_eval do\n  def palindrome? = self == self.reverse\nend`},
    {term:"instance_variable_get/set",cat:"Metaprogramming",desc:"Read or write instance variables by name at runtime without accessor methods.",code:`instance_variable_set(:@name, "Alice")\ninstance_variable_get(:@name) # => "Alice"`},
    {term:"send",cat:"Metaprogramming",desc:"Calls any method by name, including private ones — useful for dynamic dispatch.",code:`obj.send(:private_method, arg)\nmodel.send("\#{attr}=", value)`},
    {term:"extend vs include",cat:"Metaprogramming",desc:"include adds module methods as instance methods; extend adds them as class methods.",code:`module Greetable\n  def greet = "Hello!"\nend\nclass A; include Greetable; end  # A.new.greet\nclass B; extend  Greetable; end  # B.greet`},
    {term:"prepend",cat:"Metaprogramming",desc:"Inserts a module before the class in the ancestor chain, letting you wrap existing methods.",code:`module Logging\n  def save\n    puts "saving..."\n    super\n  end\nend\nclass Post; prepend Logging; end`},
    {term:"Struct",cat:"Metaprogramming",desc:"Generates a lightweight class with accessors, ==, and to_s from a list of attributes.",code:`Point = Struct.new(:x, :y) do\n  def distance = Math.sqrt(x**2 + y**2)\nend`},
    {term:"describe / context / it",cat:"RSpec",desc:"describe groups examples by subject; context by scenario; it declares a single example.",code:`describe Order do\n  context "when empty" do\n    it "has a zero total" do\n      expect(Order.new.total).to eq(0)\n    end\n  end\nend`},
    {term:"let / let!",cat:"RSpec",desc:"let defines a lazily-evaluated helper; let! evaluates eagerly (before each example).",code:`let(:user)  { create(:user) }\nlet!(:post) { create(:post, author: user) }`},
    {term:"subject",cat:"RSpec",desc:"The implicit or explicit object under test; used with is_expected for one-liner expectations.",code:`subject(:result) { described_class.call(params) }\nit { is_expected.to be_success }`},
    {term:"before / after hooks",cat:"RSpec",desc:"Run setup/teardown code before or after each or all examples in a group.",code:`before { sign_in user }\nafter  { user.destroy }`},
    {term:"shared_examples",cat:"RSpec",desc:"Reuse a set of examples across multiple describe blocks to DRY up specs.",code:`shared_examples "a paginated resource" do\n  it { is_expected.to have_key(:meta) }\nend\nit_behaves_like "a paginated resource"`},
    {term:"doubles and mocks",cat:"RSpec",desc:"instance_double creates a verifying test double; allow stubs a method; expect verifies a call.",code:`mailer = instance_double(UserMailer)\nallow(mailer).to receive(:deliver_later)\nexpect(mailer).to have_received(:deliver_later)`},
    {term:"have_received (spy style)",cat:"RSpec",desc:"Assert after-the-fact that a message was received — works with spy or allow.",code:`allow(stripe).to receive(:charge)\norder.checkout\nexpect(stripe).to have_received(:charge).with(amount: 500)`},
    {term:"aggregate_failures",cat:"RSpec",desc:"Runs all expectations in a block and reports every failure, not just the first.",code:`aggregate_failures do\n  expect(res.status).to eq(200)\n  expect(res.body).to include("ok")\nend`},
    {term:"FactoryBot traits",cat:"RSpec",desc:"Traits add reusable attribute overrides to a factory, composable on create/build.",code:`factory :user do\n  trait :admin { role { "admin" } }\n  trait :suspended { active { false } }\nend\ncreate(:user, :admin, :suspended)`},
    {term:"VCR / WebMock",cat:"RSpec",desc:"WebMock stubs HTTP; VCR records and replays real HTTP interactions as cassettes.",code:`stub_request(:get, /api.example.com/)\n  .to_return(status: 200, body: fixture)`},
    {term:"Sidekiq worker",cat:"Background Jobs",desc:"Include Sidekiq::Worker and define perform to run a job asynchronously.",code:`class EmailWorker\n  include Sidekiq::Worker\n  def perform(user_id)\n    User.find(user_id).send_welcome!\n  end\nend\nEmailWorker.perform_async(user.id)`},
    {term:"perform_later (ActiveJob)",cat:"Background Jobs",desc:"Rails-native job abstraction; perform_later enqueues, perform_now runs inline.",code:`class ReportJob < ApplicationJob\n  queue_as :default\n  def perform(user)\n    ReportMailer.send(user).deliver_now\n  end\nend\nReportJob.perform_later(user)`},
    {term:"set (Sidekiq options)",cat:"Background Jobs",desc:"Chain .set to override queue, wait time, or retry count per enqueue.",code:`HardJob.set(queue: :critical, wait: 5.minutes)\n       .perform_async(record.id)`},
    {term:"retry_on / discard_on",cat:"Background Jobs",desc:"Automatically retry on specific errors with wait and attempt limits; discard on others.",code:`retry_on  Stripe::RateLimitError, wait: :exponentially_longer, attempts: 5\ndiscard_on ActiveRecord::RecordNotFound`},
    {term:"Sidekiq scheduled jobs",cat:"Background Jobs",desc:"Use perform_in or perform_at to schedule a job for future execution.",code:`ReminderWorker.perform_in(1.hour, user.id)\nReportWorker.perform_at(Time.zone.tomorrow.noon, org.id)`},
    {term:"idempotency",cat:"Background Jobs",desc:"Design jobs so running them twice produces the same result — guard with DB state or unique keys.",code:`def perform(order_id)\n  order = Order.find(order_id)\n  return if order.charged?   # guard\n  order.charge!\nend`},
    {term:"Sidekiq batches (Pro)",cat:"Background Jobs",desc:"Group jobs into a batch and run a callback when all complete.",code:`batch = Sidekiq::Batch.new\nbatch.on(:complete, MyCallback, "id" => record.id)\nbatch.jobs { items.each { |i| ItemWorker.perform_async(i) } }`},
    {term:"unique jobs",cat:"Background Jobs",desc:"Prevent duplicate jobs in the queue with sidekiq-unique-jobs or ActiveJob uniqueness plugins.",code:`sidekiq_options unique: :until_executed,\n                unique_args: ->(args) { [args.first] }`},
  ]
};
</script>
